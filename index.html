<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima Aeronáutico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 🔍 BUSCADOR -->
  <div class="buscador">
    <div class="buscador-inner">
      <input type="text" id="icao" placeholder="Ej: SAEZ">
      <button onclick="buscarClima()">Buscar</button>
      <button onclick="toggleFavorito()" id="btnFav">☆</button>
    </div>
  </div>

  <!-- ⭐ FAVORITOS -->
  <div id="favoritos" class="favoritos-bar"></div>

  <!-- STATUS -->
  <div id="status" class="card status">
    <div id="icono">✈️</div>
    <div id="textoStatus">Esperando datos...</div>
  </div>

  <!-- RESUMEN -->
  <div id="resumen"></div>

  <!-- GRID -->
  <div class="grid">
    <div class="card">
      <h3>METAR</h3>
      <pre id="metar"></pre>
    </div>

    <div class="card">
      <h3>TAF</h3>
      <pre id="taf"></pre>
    </div>
  </div>

  <div id="alertas"></div>

</div>

<script src="app.js"></script>
</body>
</html>
