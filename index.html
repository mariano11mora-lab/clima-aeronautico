<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clima Aeronáutico</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <!-- BUSCADOR -->
  <div class="buscador">
    <input type="text" id="icao" placeholder="Ej: SAEZ">
    <button onclick="buscarClima()">Buscar</button>
    <button onclick="agregarFavorito()">+ Favorito</button>
  </div>

  <!-- FAVORITOS -->
  <div id="favoritos" class="favoritos"></div>

  <!-- STATUS -->
  <div id="status" class="status">
    <div id="icono">☀️</div>
    <div id="textoStatus">---</div>
  </div>

  <!-- RESUMEN -->
  <div id="resumen" class="resumen"></div>

  <!-- GRID -->
  <div class="grid">
    <div class="card">
      <h3>METAR</h3>
      <div id="metar"></div>
    </div>

    <div class="card">
      <h3>TAF</h3>
      <div id="taf"></div>
    </div>
  </div>

  <!-- ALERTAS -->
  <div id="alertas"></div>

</div>

<script src="app.js"></script>
</body>
</html>
